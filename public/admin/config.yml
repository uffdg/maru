backend:
  name: github
  repo: uffdg/maru
  branch: main
  base_url: https://marufiorillo.com
  auth_endpoint: /api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "posts_json"
    label: "Posts JSON"
    files:
      - label: "Blog posts"
        name: "posts"
        file: "src/data/posts.json"
        format: "json"
        editor:
          preview: false
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.slug}}"
            fields:
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Label", name: "label", widget: "string" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Excerpt", name: "excerpt", widget: "text" }
                  - { label: "Content", name: "content", widget: "code", default_language: "json", output_code_only: true }
              - label: "Español"
                name: "es"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Excerpt", name: "excerpt", widget: "text" }
                  - { label: "Content", name: "content", widget: "code", default_language: "json", output_code_only: true }
  - name: "cases_json"
    label: "Cases JSON"
    files:
      - label: "Case studies"
        name: "cases"
        file: "src/data/cases.json"
        format: "json"
        editor:
          preview: false
        fields:
          - { label: "Cases", name: "cases", widget: "code", default_language: "json", output_code_only: true }
